runtime:
  evaluator: ultralytics.YOLO.val
  evaluator_contract_version: synthdet-evaluator-v1
  python: 3.11.9
  pytorch: 2.13.0+cpu
  ultralytics: 8.4.101

evaluation:
  split: test
  image_size: 640
  batch: 4
  device: cpu
  device_policy: fixed_cpu_for_documented_cpu_only_pytorch_environment
  workers: 0
  worker_policy: zero_workers_for_windows_portability_and_deterministic_file_order
  seed: 42
  deterministic: true
  confidence_threshold: 0.001
  confidence_policy: frozen_training_validation_floor_for_full_pr_curve_and_ap_integration
  iou_threshold: 0.70
  nms_policy: class_aware_standard_ultralytics_nms
  max_detections: 300
  augment: false
  agnostic_nms: false
  single_class: false
  rectangular_batches: true
  half_precision: false
  precision_policy: float32_no_amp
  save_json: true
  save_txt: true
  save_confidence: true
  plots: true

object_size_policy:
  coordinate_space: original_image_pixels
  area_definition: bounding_box_width_times_height
  small:
    minimum_area_px: 0
    maximum_area_px_exclusive: 1024
  medium:
    minimum_area_px_inclusive: 1024
    maximum_area_px_exclusive: 9216
  large:
    minimum_area_px_inclusive: 9216

ranking:
  direction: descending
  primary_metric: map50_95
  tie_breakers:
    - map50
    - macro_per_class_ap50_95
    - recall
    - latency_ms
    - checkpoint_size_bytes
  latency_direction: ascending
  checkpoint_size_direction: ascending
  no_validation_only_winner: true

latency:
  source: ultralytics_validation_speed
  unit: milliseconds_per_image
  components:
    - preprocess
    - inference
    - postprocess
  model_load_excluded: true
  warmup: framework_synthetic_tensor_only
  protected_images_repeated_for_latency: false
  throughput_formula: 1000_divided_by_total_latency_ms
  device_scope: cpu_only_for_all_five_models

campaign:
  expected_complete_models: 5
  maximum_successful_campaigns: 1
  partial_results_must_not_drive_changes: true
  alternative_threshold_runs_forbidden: true
  retry_policy: complete_five_model_retry_only_after_recorded_technical_execution_failure
  exact_command: python scripts/run_sprint5_evaluation.py --contract configs/evaluation/sprint5_final.yaml
  output_root: artifacts/evaluation/sprint5-final-20260720-v1

output_schema:
  version: synthdet-sprint5-results-v1
  required_model_metrics:
    - precision
    - recall
    - map50
    - map50_95
    - per_class_precision
    - per_class_recall
    - per_class_ap50
    - per_class_ap50_95
    - object_size_metrics
    - confusion_matrix
    - normalized_confusion_matrix
    - precision_recall_curve
    - f1_confidence_curve
    - precision_confidence_curve
    - recall_confidence_curve
    - per_image_predictions
    - latency
    - throughput
    - checkpoint_size
    - parameter_count
    - flops_when_available
    - metadata
    - prediction_sha256
    - result_sha256
