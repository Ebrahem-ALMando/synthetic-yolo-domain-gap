project:
  name: synthetic-yolo-domain-gap
  description: Measuring the synthetic-to-real domain gap in YOLO object detection
  sprint: 4

seed: 42

dataset:
  name: Aquarium Combined
  identifier: aquarium-combined-v2-raw-1024
  candidate: null
  status: approved_immutable_split_v2_frozen
  version: 2
  export_name: raw-1024
  annotation_format: YOLOv5 PyTorch detection
  license: CC BY 4.0
  class_names:
    - fish
    - jellyfish
    - penguin
    - puffin
    - shark
    - starfish
    - stingray
  split_seed: 42
  duplicate_detection:
    method: dhash-64
    hamming_threshold: 6
  object_size_rule:
    small_max_area_px: 1024   # 32^2, exclusive upper bound
    medium_max_area_px: 9216  # 96^2, exclusive upper bound
  paths:
    raw: datasets/raw/aquarium/export
    audit: reports/dataset_audit/aquarium
    train_manifest: manifests/aquarium/v2/real_train.csv
    validation_manifest: manifests/aquarium/v2/real_val.csv
    test_manifest: manifests/aquarium/v2/real_test.csv
    excluded_manifest: manifests/aquarium/v2/excluded.csv
    duplicate_groups: manifests/aquarium/v2/duplicate_groups.csv
    split_metadata: manifests/aquarium/v2/split_metadata.json

paths:
  datasets_root: datasets
  real_data: datasets/processed/real
  synthetic_data: datasets/processed/aquarium/synthetic/v1
  splits: manifests/aquarium/v2
  artifacts_root: artifacts
  experiment_runs: artifacts/experiments
  models: models
  reports: reports

